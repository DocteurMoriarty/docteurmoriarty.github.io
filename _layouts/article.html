---
layout: default
---
<article class="article-page">
  <div class="article-meta">
    <a class="back-link" href="{{ '/' | relative_url }}">Retour a l'accueil</a>
    {% assign current_category = site.data.categories | where: "slug", page.category | first %}
    {% if current_category %}
      <span class="category-pill">{{ current_category.title }}</span>
    {% endif %}
  </div>

  <header class="article-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="article-content">
    {{ content }}
  </div>
</article>
