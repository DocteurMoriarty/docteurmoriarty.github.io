---
layout: default
---
<article class="article-page">
  <div class="article-meta">
    <a class="back-link" href="{{ '/' | relative_url }}">Back to index</a>
  </div>

  <header class="article-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="article-content">
    {{ content }}
  </div>
</article>
