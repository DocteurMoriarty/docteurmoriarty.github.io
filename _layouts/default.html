<!DOCTYPE html>
<html lang="{{ site.lang | default: 'fr' }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span>
            <strong>{{ site.title }}</strong>
            <small>{{ site.description }}</small>
          </span>
        </a>

        <nav class="sidebar-nav">
          <a href="{{ '/' | relative_url }}">Index</a>
        </nav>

        <section class="sidebar-section">
          <h2>Articles</h2>
          <ul class="sidebar-list">
            {% assign sorted_articles = site.articles | sort: "date" | reverse %}
            {% for article in sorted_articles %}
              <li><a href="{{ article.url | relative_url }}">{{ article.title }}</a></li>
            {% endfor %}
          </ul>
        </section>
      </aside>

      <main class="content-area">
        {{ content }}
      </main>
    </div>
  </body>
</html>
